<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Content Demo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="top-bar">
    <h1>Course Content Demo</h1>
    <p>HTML DOM, Events, and CSS Class Modifications</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>1) DOM Access</h2>
      <p class="myElement"></p>
    </section>

    <section class="card">
      <h2>2) Event Exercise</h2>
      <p>Click a box to add a line with the selected color.</p>
      <div class="box-row">
        <div class="event-box red-box" id="redBox"></div>
        <div class="event-box yellow-box" id="yellowBox"></div>
      </div>
      <div id="eventLog" class="event-log"></div>
    </section>

    <section class="card">
      <h2>3) CSS Class Toggle</h2>
      <div class="controls">
        <button type="button" id="clickCircle">Circle</button>
        <button type="button" id="clickSquare">Square</button>
        <button type="button" id="clickRed">Red</button>
        <button type="button" id="clickYellow">Yellow</button>
      </div>
      <div id="shape" class="shape circle red"></div>
    </section>
  </main>
</body>
</html>
