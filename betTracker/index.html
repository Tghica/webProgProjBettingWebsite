<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>betTracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <h1>betTracker</h1>
    <p>Track your bets in one place.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Quick Add</h2>
      <form>
        <label for="event">Event</label>
        <input id="event" type="text" placeholder="Team A vs Team B" />

        <label for="stake">Stake</label>
        <input id="stake" type="number" placeholder="20" />

        <label for="odds">Odds</label>
        <input id="odds" type="number" step="0.01" placeholder="1.75" />

        <button type="button">Save Bet</button>
      </form>
    </section>

    <section class="card">
      <h2>Open Bets</h2>
      <ul id="openBets"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
